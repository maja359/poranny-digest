name: Poranny Digest

on:
  schedule:
    # 05:45 UTC = 07:45 Europe/Warsaw (summer). Off the full hour on purpose:
    # the old "0 7" cron queued behind everyone else's and fired 2-4.5h late.
    - cron: "45 5 * * *"
  workflow_dispatch: {}    # lets you run it manually from the Actions tab

permissions:
  contents: write          # GITHUB_TOKEN can commit to this repo — no PAT needed

concurrency:
  group: digest
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install anthropic

      - name: Generate + render digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_digest.py

      - name: Commit & push
        run: |
          git config user.name  "poranny-digest-bot"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "digest ${{ github.run_id }}"
          git push

      - name: Post link to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          # the script writes the payload only when it actually generated a new edition
          if [ -f "$RUNNER_TEMP/slack_payload.json" ]; then
            curl -fsS -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              --data @"$RUNNER_TEMP/slack_payload.json"
          else
            echo "no payload — nothing new published, skipping Slack"
          fi

      - name: Alert Slack on failure
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -fsS -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data "{\"text\":\"<@ULYLZE1KQ> ⚠️ Poranny digest NIE wygenerował się dziś. Logi: https://github.com/maja359/poranny-digest/actions/runs/${{ github.run_id }}\"}"
